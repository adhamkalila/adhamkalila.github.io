<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adham Kalila — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #1a2340;
    }

    /* ── Blurred fake site behind ── */
    .fake-site {
      position: fixed;
      inset: 0;
      filter: blur(8px) brightness(0.65);
      transform: scale(1.04);
      display: flex;
      flex-direction: column;
      background: #1a2340;
    }

    .fake-nav {
      background: #0f1728;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 36px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .fake-logo  { width: 100px; height: 13px; background: rgba(255,255,255,0.28); border-radius: 4px; }
    .fake-links { display: flex; gap: 22px; }
    .fake-link  { height: 9px; background: rgba(255,255,255,0.16); border-radius: 3px; }

    .fake-hero {
      padding: 64px 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .fake-h1  { width: 280px; height: 30px; background: rgba(255,255,255,0.24); border-radius: 4px; }
    .fake-p   { height: 12px; background: rgba(255,255,255,0.11); border-radius: 3px; }
    .fake-btn { width: 120px; height: 38px; background: rgba(100,140,255,0.38); border-radius: 7px; margin-top: 10px; }

    .fake-cards {
      padding: 28px 40px;
      display: flex;
      gap: 18px;
    }
    .fake-card {
      flex: 1;
      height: 100px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ── Overlay badge ── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .badge {
      background: rgba(12, 17, 36, 0.88);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 44px 56px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }

    .badge .icon  { font-size: 36px; margin-bottom: 18px; }
    .badge h1     { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 10px; letter-spacing: 0.01em; }
    .badge p      { font-size: 14px; color: rgba(255,255,255,0.52); line-height: 1.65; margin-bottom: 24px; }
    .badge .domain {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.05em;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 18px;
    }
  </style>
</head>
<body>

  <!-- Blurred background that looks like a website -->
  <div class="fake-site" aria-hidden="true">
    <div class="fake-nav">
      <div class="fake-logo"></div>
      <div class="fake-links">
        <div class="fake-link" style="width:50px"></div>
        <div class="fake-link" style="width:38px"></div>
        <div class="fake-link" style="width:64px"></div>
        <div class="fake-link" style="width:46px"></div>
      </div>
    </div>
    <div class="fake-hero">
      <div class="fake-h1"></div>
      <div class="fake-p" style="width:420px"></div>
      <div class="fake-p" style="width:300px"></div>
      <div class="fake-btn"></div>
    </div>
    <div class="fake-cards">
      <div class="fake-card"></div>
      <div class="fake-card"></div>
      <div class="fake-card"></div>
    </div>
  </div>

  <!-- Under construction badge -->
  <div class="overlay">
    <div class="badge">
      <div class="icon">🚧</div>
      <h1>Under Construction</h1>
      <p>Something great is on the way.<br>Check back soon.</p>
      <div class="domain">adhamkalila.com</div>
    </div>
  </div>

</body>
</html>
